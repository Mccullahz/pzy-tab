services:
  roaster-go:
    build:
      context: ./backend
    container_name: roaster-go
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    restart: unless-stopped

  php:
    build:
      context: ./frontend
    container_name: roaster-php
    volumes:
      - ./frontend:/var/www
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: roaster-nginx
    ports:
      - "8000:80"
    volumes:
      - ./frontend:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - roaster-go
    restart: unless-stopped

